# App-specific tweaks

# 1Password
windowrule = match:class ^(1Password)$, no_screenshare 1

# Bitwarden
windowrule = match:class ^(Bitwarden)$, no_screenshare 1

# Browser types
windowrule = match:class ^((google-)?[cC]hrom(e|ium)|[bB]rave-browser|Microsoft-edge|Vivaldi-stable|helium)$, tag +chromium-based-browser
windowrule = match:class ^([fF]irefox|zen|librewolf)$, tag +firefox-based-browser
windowrule = match:tag ^(chromium-based-browser)$, tile 1
windowrule = match:tag ^(chromium-based-browser)$, opacity 1 0.97
windowrule = match:tag ^(firefox-based-browser)$, opacity 1 0.97
windowrule = match:initial_title ^((?i)(?:[a-z0-9-]+\.)*youtube\.com_/|app\.zoom\.us_/wc/home)$, opacity 1.0 1.0

# hyprshot
windowrule = match:layer ^(selection)$, no_animation 1

# JetBrains
windowrule = match:class ^(.*jetbrains.*)$, match:title ^$, size 50% 50%
windowrule = match:class ^(.*jetbrains.*)$, match:title ^\s$, no_initial_focus 1
# windowrule = unset,nofocus,class:^(.*jetbrains.*)$,title:^$ # These unsets might need rethinking in new syntax, but I'll skip for now if they aren't standard rules
# windowrule = unset,noinitialfocus,class:^(.*jetbrains.*)$,title:^$

# LocalSend
windowrule = match:class ^(Share|localsend)$, float 1
windowrule = match:class ^(Share|localsend)$, center 1

# Picture-in-picture
windowrule = match:title ^(Picture.{0,1}in.{0,1}[Pp]icture)$, tag +pip
windowrule = match:tag ^(pip)$, float 1
windowrule = match:tag ^(pip)$, pin 1
windowrule = match:tag ^(pip)$, size 600 338
windowrule = match:tag ^(pip)$, keep_aspect_ratio 1
windowrule = match:tag ^(pip)$, no_border 1
windowrule = match:tag ^(pip)$, opacity 1 1
windowrule = match:tag ^(pip)$, move 100%-w-40 4%

# QEMU
windowrule = match:class ^(qemu)$, opacity 1 1

# RetroArch
windowrule = match:class ^(com.libretro.RetroArch)$, fullscreen 1
windowrule = match:class ^(com.libretro.RetroArch)$, opacity 1 1
windowrule = match:class ^(com.libretro.RetroArch)$, idle_inhibit fullscreen

# Steam
windowrule = match:class ^(steam)$, float 1
windowrule = match:class ^(steam)$, match:title ^(Steam)$, center 1
windowrule = match:class ^(steam)$, opacity 1 1
windowrule = match:class ^(steam)$, match:title ^(Steam)$, size 1100 700
windowrule = match:class ^(steam)$, match:title ^(Friends List)$, size 460 800
windowrule = match:class ^(steam)$, idle_inhibit fullscreen

# System
windowrule = match:tag ^(floating-window)$, float 1
windowrule = match:tag ^(floating-window)$, center 1
windowrule = match:tag ^(floating-window)$, size 800 600
windowrule = match:class ^(blueberry.py|Impala|Wiremix|org.gnome.NautilusPreviewer|com.gabm.satty|Dotfiles|About|TUI.float)$, tag +floating-window
windowrule = match:class ^(xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org.gnome.Nautilus)$, match:title ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*)$, tag +floating-window
windowrule = match:class ^(org.gnome.Calculator)$, float 1
windowrule = match:class ^(Screensaver)$, fullscreen 1
windowrule = match:class ^(zoom|vlc|mpv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|imv|org.gnome.NautilusPreviewer)$, opacity 1 1

# Terminals
windowrule = match:class ^(Alacritty|kitty|com.mitchellh.ghostty)$, tag +terminal

# Webcam overlay
windowrule = match:title ^(WebcamOverlay)$, float 1
windowrule = match:title ^(WebcamOverlay)$, pin 1
windowrule = match:title ^(WebcamOverlay)$, no_initial_focus 1
windowrule = match:title ^(WebcamOverlay)$, no_dim 1
windowrule = match:title ^(WebcamOverlay)$, move 100%-w-40 100%-w-40

# General window rules
windowrule = match:class .*, suppress_event maximize
windowrule = match:class .*, opacity 0.97 0.9
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:floating 1, match:fullscreen 0, match:pinned 0, no_focus 1
